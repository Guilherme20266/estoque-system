<!DOCTYPE html>
<html>
<head>

<title>{% block title %}Sistema{% endblock %}</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#007bff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Estoque">

<link rel="icon" href="/static/icon-192.png?v=2">
<link rel="apple-touch-icon" href="/static/icon-192.png">

{% block head %}{% endblock %}

<style>

/* ===== FUNDO GLOBAL SÓ (não mexe no resto) ===== */
body {
    margin: 0;
    background: #f4f4f4;
    transition: 0.3s;
}

/* ===== DARK MODE SIMPLES (SEM ESTRAGAR CORES) ===== */
body.dark {
    background: #0f172a;
}

/* botão tema */
#themeToggle {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    font-size: 14px;
}

{% block style %}{% endblock %}

</style>

</head>

<body>

<button id="themeToggle">🌙</button>

{% block content %}{% endblock %}

{% block script %}{% endblock %}

<script>

const btn = document.getElementById("themeToggle");

// carregar preferência
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
    btn.innerHTML = "☀️";
}

btn.onclick = function(){

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        btn.innerHTML = "☀️";
    } else {
        localStorage.setItem("theme","light");
        btn.innerHTML = "🌙";
    }

}

</script>

</body>
</html>
