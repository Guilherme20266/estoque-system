<!DOCTYPE html>
<html>
<head>

<title>{% block title %}Sistema{% endblock %}</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#007bff">

<link rel="icon" href="/static/icon-192.png?v=2">
<link rel="apple-touch-icon" href="/static/icon-192.png">

<style>

/* ===== TEMA CLARO ===== */
:root {
    --bg: #f4f4f4;
    --card: #ffffff;
    --text: #111827;
    --border: #e5e5e5;
}

/* ===== TEMA ESCURO ===== */
body.dark {
    --bg: #0b0f19;
    --card: #111827;
    --text: #f1f5f9;
    --border: #1f2937;
}

/* ===== APLICA GLOBAL ===== */
body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
    font-family: Arial, sans-serif;
}

/* ===== ELEMENTOS QUE VOCÊ USA NOS HTMLS ===== */
.box,
.card,
.topo {
    background: var(--card);
    color: var(--text);
}

/* inputs */
input, select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
}

/* botões NÃO mexe nas cores originais */
button {
    color: inherit;
}

/* botão tema */
#themeToggle {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

</style>

{% block head %}{% endblock %}

</head>

<body>

<button id="themeToggle">🌙</button>

{% block content %}{% endblock %}

{% block script %}{% endblock %}

<script>

const btn = document.getElementById("themeToggle");

// carregar tema salvo
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
    btn.innerHTML = "☀️";
}

btn.onclick = function(){

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
        btn.innerHTML = "☀️";
    } else {
        localStorage.setItem("theme","light");
        btn.innerHTML = "🌙";
    }

}

</script>

</body>
</html>
