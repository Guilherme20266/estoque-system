<!DOCTYPE html>
<html>
<head>

<title>Consulta</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:15px;
}

.box{
max-width:600px;
margin:auto;
}

h2{
text-align:center;
}

.menu{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6c757d;
color:white;
margin-bottom:15px;
}

.busca{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
box-sizing:border-box;
}

.card{
background:white;
padding:14px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.urgente{
border-left:8px solid red;
}

.atencao{
border-left:8px solid orange;
}

.ok{
border-left:8px solid green;
}

.piscando{
color:red;
font-weight:bold;
animation:piscar 1s infinite;
}

@keyframes piscar{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>

</head>

<body>

<div class="box">

<h2>🔎 Consulta</h2>

<a href="/">
<button class="menu">
🏠 Voltar ao Menu
</button>
</a>

<form method="GET">

<input
type="text"
name="busca"
class="busca"
placeholder="Nome, código ou endereço..."
value="{{ busca }}"
>

</form>

{% for item in lista %}

<div class="card
{% if item.status == 'URGENTE' %}
urgente
{% elif item.status == 'ATENCAO' %}
atencao
{% else %}
ok
{% endif %}
">

{% if item.status == 'URGENTE' %}
<div class="piscando">
🚨 URGENTE
</div>
{% endif %}

<b>{{ item.produto.nome }}</b>

<br><br>

🏷️ Código:
{{ item.produto.codigo }}

<br>

📦 Quantidade:
{{ item.produto.quantidade }}

<br>

📅 Validade:
{{ item.produto.validade }}

<br>

📍 Endereço:
{{ item.produto.endereco }}

</div>

{% endfor %}

</div>

</body>
</html>
