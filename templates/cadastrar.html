<!DOCTYPE html>
<html>
<head>

<title>Cadastrar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
}

/* CONTAINER */
.box{
background:white;
max-width:500px;
width:100%;
margin:auto;
padding:20px;
border-radius:10px;
box-sizing:border-box;
}

/* INPUTS */
input,select{
width:100%;
padding:12px;
margin-bottom:12px;
font-size:16px;
box-sizing:border-box;
}

/* BOTÃO */
button{
width:100%;
padding:14px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

/* ALERTAS */
.alert{
padding:12px;
border-radius:8px;
margin-bottom:10px;
text-align:center;
font-weight:bold;
color:white;
}

.sucesso{
background:#28a745;
}

.erro{
background:#dc3545;
}

/* 🔥 AJUSTE MOBILE */
@media (max-width: 768px) {

body{
padding:10px;
}

.box{
padding:15px;
}

input,select,button{
font-size:16px;
padding:14px;
}

h2{
font-size:20px;
}

}

</style>

</head>

<body>

<a href="/menu">
    <button style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#6c757d;
        color:white;
        font-size:15px;
        margin-bottom:10px;
        cursor:pointer;
    ">
        🏠 Voltar ao Menu
    </button>
</a>

<div class="box">

{% if request.args.get('sucesso') %}
<div class="alert sucesso">
    ✅ Produto cadastrado com sucesso!
</div>
{% endif %}

{% if request.args.get('erro') == 'endereco' %}
<div class="alert erro">
    ❌ Esse endereço já está ocupado!
</div>
{% endif %}

<h2>➕ Cadastrar Produto</h2>

<form method="POST">

<input name="nome" placeholder="Nome" required>

<input name="codigo" placeholder="Código">

<input type="number" name="quantidade" placeholder="Quantidade" required>

<input name="validade" placeholder="DD/MM/AAAA">

<select name="rua">
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="H">H</option>
<option value="I">I</option>
<option value="J">J</option>
<option value="K">K</option>
<option value="L">L</option>
<option value="M">M</option>
<option value="LAJE1">LAJE1</option>
<option value="LAJE2">LAJE2</option>
<option value="LAJE3">LAJE3</option>
</select>

<select name="coluna">
{% for i in range(1,61) %}
<option value="{{i}}">{{i}}</option>
{% endfor %}
</select>

<select name="nivel">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<button type="submit">
Salvar
</button>

</form>

</div>

</body>
</html>
