{% extends 'base.html' %}

{% block content %}

<h2>Nova Solicitação</h2>

<form method="POST">

    <label>Produto</label><br>
    <input type="text" name="produto" required><br><br>

    <label>Quantidade</label><br>
    <input type="number" name="quantidade" min="1" required><br><br>

    <label>Tipo</label><br>

    <select name="tipo">

        <option value="Separar">Separar</option>

        <option value="Abastecer">Abastecer</option>

    </select>

    <br><br>

    <label>Observação</label><br>

    <textarea
        name="observacao"
        rows="5"
    ></textarea>

    <br><br>

    <button type="submit">
        Enviar Solicitação
    </button>

</form>

{% endblock %}
