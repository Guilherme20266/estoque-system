<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    width:90%;
    max-width:400px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.info{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:13px;
}

</style>

</head>

<body>

<div class="box">

<h1>📦 Controle de Estoque</h1>

<form action="/entrar" method="POST">

<input
type="text"
name="usuario"
placeholder="Usuário"
required
>

<input
type="password"
name="senha"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

<div class="info">
Sistema de Estoque
</div>

</div>

</body>
</html>
