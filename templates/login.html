<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family:Arial;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #0f172a, #1e293b);
}

/* caixa principal */
.box{
    background:rgba(255,255,255,0.95);
    width:90%;
    max-width:380px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    backdrop-filter:blur(10px);
}

/* título */
h1{
    text-align:center;
    margin-bottom:5px;
    font-size:26px;
    color:#111827;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#6b7280;
    margin-bottom:25px;
}

/* inputs */
input{
    width:100%;
    padding:13px;
    margin-bottom:12px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    box-sizing:border-box;
    outline:none;
    transition:0.2s;
    font-size:14px;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

/* botão */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg, #2563eb, #1d4ed8);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
    opacity:0.95;
}

/* rodapé */
.info{
    text-align:center;
    margin-top:18px;
    color:#9ca3af;
    font-size:12px;
}

.badge{
    display:block;
    text-align:center;
    font-size:11px;
    color:#64748b;
    margin-top:5px;
}

</style>

</head>

<body>

<div class="box">

<h1>📦 Ataca-Tudo</h1>
<div class="subtitle">Sistema de Estoque e Controle</div>

<form action="/entrar" method="POST">

<input type="text" name="usuario" placeholder="Usuário" required>

<input type="password" name="senha" placeholder="Senha" required>

<button type="submit">Entrar</button>

</form>

<div class="info">
© 2026 | All rights reserved | Dev. @GS
<span class="badge">v4.0.1 - Beta Final</span>
</div>

</div>

</body>
</html>
